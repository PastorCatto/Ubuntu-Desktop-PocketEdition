# ======================================================
# Device: OnePlus 6 (enchilada)
# SoC: Qualcomm SDM845
# ======================================================

DEVICE_NAME="OnePlus 6"
DEVICE_CODENAME="enchilada"
DEVICE_BRAND="oneplus"
DEVICE_ARCH="arm64"
DEVICE_SIM_SLOTS=2

# --- Kernel ---
KERNEL_METHOD="mobian"
KERNEL_REPO="https://repo.mobian.org/pool/main/l/"
KERNEL_SERIES="6.18-sdm845"
KERNEL_VERSION_PIN=""

# --- Boot ---
BOOT_METHOD="mkbootimg"
MKBOOTIMG_PAGESIZE=4096
MKBOOTIMG_BASE=0x00000000
MKBOOTIMG_KERNEL_OFFSET=0x00008000
MKBOOTIMG_RAMDISK_OFFSET=0x01000000
MKBOOTIMG_TAGS_OFFSET=0x00000100
BOOT_DTB_APPEND=true
BOOT_DTB="sdm845-oneplus-enchilada.dtb"
BOOT_PANEL_PICKER=false

# --- U-Boot (placeholder) ---
UBOOT_URL=""
UBOOT_CONFIG=""

# --- UEFI (placeholder) ---
UEFI_URL=""
UEFI_ESP_SIZE_MB=32

# --- Firmware ---
# mbu.sh pulls blobs from linux-firmware (kernel.org sparse clone)
# and applies pmaports speaker amp overrides (tfa98xx.cnt, crbtfw21.tlv).
# Output: firmware/oneplus-enchilada/firmware.tar.gz
# firmware/oneplus-fajita -> symlink to oneplus-enchilada (run firmware/setup-links.sh)
FIRMWARE_METHOD="bundle"
FIRMWARE_REPO=""
FIRMWARE_APT_SUBPATH="qcom/sdm845/oneplus6"
FIRMWARE_PMAPORTS_DEVICE="oneplus-enchilada"
FIRMWARE_INSTALL_PATH="/"

# --- Extra apt packages ---
DEVICE_PACKAGES="qrtr-tools rmtfs tqftpserv protection-domain-mapper qbootctl"

# --- Systemd services to enable ---
DEVICE_SERVICES="qrtr-ns rmtfs pd-mapper tqftpserv"

# --- Quirks ---
DEVICE_QUIRKS="dtb_append qcom_services"

# --- Known issues ---
# hexagonrpcd is intentionally NOT installed. See xiaomi-beryllium-tianma.conf
# for full explanation. SLPI crash loop is cosmetic, all other hardware works.

# --- Hostname ---
DEVICE_HOSTNAME="mobuntu-enchilada"

# --- Image label ---
DEVICE_IMAGE_LABEL="mobuntu-enchilada"
