# Mobuntu RC15 — WirePlumber ALSA tuning (SDM845)
# api.alsa.period-* deliberately omitted — wireplumber auto-selection
# works better on SDM845 devices (per qcom-phone-utils 0.4.1 upstream fix)
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_input.*" },
      { node.name = "~alsa_output.*" }
    ]
    actions = {
      update-props = {
        audio.format = "S16LE"
        audio.rate   = 48000
      }
    }
  }
]
