# ======================================================
# Device: Nintendo Switch V1 (Erista)
# Codename: icosa
# SoC: NVIDIA Tegra X1 T210
# Note: Unpatched — exploitable via software (no modchip required)
# Note: Verify BOOT_DTB and KERNEL_REPO against your switchroot install
# ======================================================

DEVICE_NAME="Nintendo Switch V1 (Erista)"
DEVICE_CODENAME="icosa"
DEVICE_BRAND="nvidia"
DEVICE_ARCH="arm64"
DEVICE_SIM_SLOTS=0

# --- Kernel ---
# Set KERNEL_REPO to the URL of the switchroot L4T kernel .deb for noble
KERNEL_METHOD="custom_url"
KERNEL_REPO=""
KERNEL_SERIES="tegra210"
KERNEL_VERSION_PIN=""

# --- Boot ---
BOOT_METHOD="l4t"
BOOT_DTB="tegra210-icosa.dtb"
BOOT_DTB_APPEND=false
BOOT_PANEL_PICKER=false

# --- mkbootimg (unused for L4T) ---
MKBOOTIMG_PAGESIZE=""
MKBOOTIMG_BASE=""
MKBOOTIMG_KERNEL_OFFSET=""
MKBOOTIMG_RAMDISK_OFFSET=""
MKBOOTIMG_TAGS_OFFSET=""

# --- U-Boot (placeholder) ---
UBOOT_URL=""
UBOOT_CONFIG=""

# --- UEFI (placeholder) ---
UEFI_URL=""
UEFI_ESP_SIZE_MB=""

# --- Firmware ---
# Switch firmware ships in linux-firmware apt package or switchroot repos
FIRMWARE_METHOD="apt"
FIRMWARE_REPO=""
FIRMWARE_INSTALL_PATH=""

# --- Extra apt packages ---
DEVICE_PACKAGES=""

# --- Systemd services to enable ---
DEVICE_SERVICES=""

# --- Quirks ---
# l4t_bootfiles: output kernel.lz4 + initrd.lz4 + DTB instead of boot.img
# firmware_source_online: pull firmware from apt/online, no local bundle
DEVICE_QUIRKS="l4t_bootfiles firmware_source_online"

# --- Hostname ---
DEVICE_HOSTNAME="mobuntu-icosa"

# --- Image label ---
DEVICE_IMAGE_LABEL="mobuntu-icosa"
