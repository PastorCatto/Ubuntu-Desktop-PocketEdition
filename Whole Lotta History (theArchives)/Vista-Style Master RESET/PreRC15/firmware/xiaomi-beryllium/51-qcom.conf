# Mobuntu WirePlumber ALSA Tuning — RC13
# Device: Xiaomi Poco F1 (beryllium)
# Source: arkadin91 reference image
monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_input.*"
      },
      {
        node.name = "~alsa_output.*"
      }
    ]
    actions = {
      update-props = {
        audio.format           = "S16LE"
        audio.rate             = 48000
        api.alsa.period-size   = 4096
        api.alsa.period-num    = 6
        api.alsa.headroom      = 512
      }
    }
  }
]
