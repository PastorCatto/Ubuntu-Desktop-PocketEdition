# ======================================================
# Device: OnePlus 6T (fajita)
# SoC: Qualcomm SDM845
# ======================================================

DEVICE_NAME="OnePlus 6T"
DEVICE_CODENAME="fajita"
DEVICE_BRAND="oneplus"
DEVICE_ARCH="arm64"
DEVICE_SIM_SLOTS=2

# --- Kernel ---
KERNEL_METHOD="mobian"
KERNEL_REPO="https://repo.mobian.org/pool/main/l/"
KERNEL_SERIES="sdm845"

# --- Boot ---
BOOT_METHOD="mkbootimg"
MKBOOTIMG_PAGESIZE=4096
MKBOOTIMG_BASE=0x00000000
MKBOOTIMG_KERNEL_OFFSET=0x00008000
MKBOOTIMG_RAMDISK_OFFSET=0x01000000
MKBOOTIMG_TAGS_OFFSET=0x00000100
BOOT_DTB_APPEND=true
BOOT_DTB="sdm845-oneplus-fajita.dtb"
BOOT_PANEL_PICKER=false

# --- U-Boot (placeholder) ---
UBOOT_URL=""
UBOOT_CONFIG=""

# --- UEFI (placeholder) ---
UEFI_URL=""
UEFI_ESP_SIZE_MB=32

# --- Firmware ---
# OnePlus 6T blobs ship in upstream linux-firmware apt package
FIRMWARE_METHOD="apt"
FIRMWARE_REPO=""
FIRMWARE_INSTALL_PATH=""

# --- Extra apt packages ---
DEVICE_PACKAGES="qrtr-tools rmtfs tqftpserv protection-domain-mapper qbootctl"

# --- Systemd services to enable ---
DEVICE_SERVICES="qrtr-ns rmtfs pd-mapper tqftpserv"

# --- Quirks ---
# No firmware_source_local: OnePlus blobs come from linux-firmware apt package
DEVICE_QUIRKS="dtb_append qcom_services"

# --- Hostname ---
DEVICE_HOSTNAME="mobuntu-fajita"

# --- Image label ---
DEVICE_IMAGE_LABEL="mobuntu-fajita"
