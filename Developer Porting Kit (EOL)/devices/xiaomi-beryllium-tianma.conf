# ======================================================
# Device: Xiaomi Poco F1 (Tianma panel)
# Codename: beryllium
# SoC: Qualcomm SDM845
# ======================================================

DEVICE_NAME="Xiaomi Poco F1 (Tianma)"
DEVICE_CODENAME="beryllium"
DEVICE_BRAND="xiaomi"
DEVICE_ARCH="arm64"
DEVICE_SIM_SLOTS=1

# --- Kernel ---
KERNEL_METHOD="mobian"
KERNEL_REPO="https://repo.mobian.org/pool/main/l/"
KERNEL_SERIES="sdm845"
KERNEL_VERSION_PIN="6.18.20"

# --- Boot ---
BOOT_METHOD="mkbootimg"
MKBOOTIMG_PAGESIZE=4096
MKBOOTIMG_BASE=0x00000000
MKBOOTIMG_KERNEL_OFFSET=0x00008000
MKBOOTIMG_RAMDISK_OFFSET=0x01000000
MKBOOTIMG_TAGS_OFFSET=0x00000100
BOOT_DTB_APPEND=true
BOOT_DTB="sdm845-xiaomi-beryllium-tianma.dtb"
BOOT_PANEL_PICKER=false

# --- U-Boot (placeholder) ---
UBOOT_URL=""
UBOOT_CONFIG=""

# --- UEFI (placeholder) ---
UEFI_URL=""
UEFI_ESP_SIZE_MB=32

# --- Firmware ---
FIRMWARE_METHOD="git"
FIRMWARE_REPO="https://gitlab.com/sdm845-mainline/firmware-xiaomi-beryllium"
FIRMWARE_INSTALL_PATH="/"

# --- Extra apt packages ---
DEVICE_PACKAGES="qrtr-tools rmtfs tqftpserv protection-domain-mapper qbootctl"

# --- Systemd services to enable ---
DEVICE_SERVICES="qrtr-ns rmtfs pd-mapper tqftpserv"

# --- Quirks ---
# dtb_append: cat kernel + dtb before mkbootimg (required for SDM845)
DEVICE_QUIRKS="dtb_append"

# --- Hostname ---
DEVICE_HOSTNAME="mobuntu-beryllium"

# --- Image label ---
DEVICE_IMAGE_LABEL="mobuntu-beryllium"