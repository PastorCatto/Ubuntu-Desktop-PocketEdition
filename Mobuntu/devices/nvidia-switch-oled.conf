# ======================================================
# Device: Nintendo Switch OLED
# Codename: aula
# SoC: NVIDIA Tegra X1+ T210B01
# Note: Modchip required (e.g. PicoFly)
# Note: Verify BOOT_DTB and KERNEL_REPO against your switchroot install
# ======================================================

DEVICE_NAME="Nintendo Switch OLED"
DEVICE_CODENAME="aula"
DEVICE_BRAND="nvidia"
DEVICE_ARCH="arm64"
DEVICE_SIM_SLOTS=0

# --- Kernel ---
# Set KERNEL_REPO to the URL of the switchroot L4T kernel .deb for noble
KERNEL_METHOD="custom_url"
KERNEL_REPO=""
KERNEL_SERIES="tegra210b01"
KERNEL_VERSION_PIN=""

# --- Boot ---
BOOT_METHOD="l4t"
BOOT_DTB="tegra210-nintendo-switch-oled.dtb"
BOOT_DTB_APPEND=false
BOOT_PANEL_PICKER=false

# --- mkbootimg (unused for L4T) ---
MKBOOTIMG_PAGESIZE=""
MKBOOTIMG_BASE=""
MKBOOTIMG_KERNEL_OFFSET=""
MKBOOTIMG_RAMDISK_OFFSET=""
MKBOOTIMG_TAGS_OFFSET=""

# --- U-Boot (placeholder) ---
UBOOT_URL=""
UBOOT_CONFIG=""

# --- UEFI (placeholder) ---
UEFI_URL=""
UEFI_ESP_SIZE_MB=""

# --- Firmware ---
FIRMWARE_METHOD="apt"
FIRMWARE_REPO=""
FIRMWARE_INSTALL_PATH=""

# --- Extra apt packages ---
DEVICE_PACKAGES=""

# --- Systemd services to enable ---
DEVICE_SERVICES=""

# --- Quirks ---
DEVICE_QUIRKS="l4t_bootfiles firmware_source_online"

# --- Hostname ---
DEVICE_HOSTNAME="mobuntu-aula"

# --- Image label ---
DEVICE_IMAGE_LABEL="mobuntu-aula"
