# devices/enchilada/device.conf
# OnePlus 6 — Qualcomm SDM845
# Status: untested — stubbed from fajita baseline
# TODO: verify FW_DEB name and DTB path before building

DEVICE_CODENAME="enchilada"
DEVICE_BRAND="oneplus"
DEVICE_MODEL="OnePlus 6"
DEVICE_SOC="sdm845"

# ── Suite ────────────────────────────────────────────────────────────────────
DEVICE_SUITE="plucky"

# ── Kernel ───────────────────────────────────────────────────────────────────
KERNEL_APT_NAME="linux-image-6.18-sdm845"
KERNEL_HEADERS_APT_NAME="linux-headers-6.18-sdm845"
KERNEL_VERSION="6.18-sdm845"

# TODO: confirm release tag for enchilada
KERNEL_IMAGE_URL=""
KERNEL_HEADERS_URL=""

# ── Firmware ─────────────────────────────────────────────────────────────────
# TODO: confirm deb name — may share fajita's or be separate
FW_DEB="linux-firmware-oneplus-sdm845.deb"
FW_ARCHIVE_URL=""

# ── Audio ────────────────────────────────────────────────────────────────────
ALSA_UCM_URL="https://repo.mobian.org/pool/main/a/alsa-ucm-conf/alsa-ucm-conf_1.2.15.3-1mobian3_all.deb"
DEVICE_MASKED_SERVICES="alsa-state alsa-restore"

# ── Display variants ─────────────────────────────────────────────────────────
DEVICE_DISPLAYS="default"
DEVICE_DEFAULT_DISPLAY="default"
DEVICE_DTB_DEFAULT="sdm845-oneplus-enchilada.dtb"

# ── Packages ─────────────────────────────────────────────────────────────────
DEVICE_PACKAGES="abootimg zstd hexagonrpcd libqrtr-glib0"

# ── Services ─────────────────────────────────────────────────────────────────
DEVICE_SERVICES="hexagonrpcd grow-rootfs"

HEXAGONRPCD_AFTER="multi-user.target"
