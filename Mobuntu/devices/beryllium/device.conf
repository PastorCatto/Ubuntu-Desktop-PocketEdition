# devices/beryllium/device.conf
# Xiaomi Poco F1 — Qualcomm SDM845
# Confirmed booting: arkadin91 image 2026-04-30

DEVICE_CODENAME="beryllium"
DEVICE_BRAND="xiaomi"
DEVICE_MODEL="Poco F1"
DEVICE_SOC="sdm845"

# ── Suite ────────────────────────────────────────────────────────────────────
# plucky (25.04) is the stable SDM845 choice — resolute has known regressions
DEVICE_SUITE="plucky"

# ── Kernel ───────────────────────────────────────────────────────────────────
# Upstream (arkadin91) installs kernel via apt from Mobian repo
KERNEL_APT_NAME="linux-image-6.18-sdm845"
KERNEL_HEADERS_APT_NAME="linux-headers-6.18-sdm845"
KERNEL_VERSION="6.18-sdm845"

# Our download-based install (used when KERNEL_INSTALL_MODE=download)
KERNEL_IMAGE_URL="https://github.com/arkadin91/packages-sdm845/releases/download/beryllium/linux-image-7.1.0-rc1-sdm845.deb"
KERNEL_HEADERS_URL="https://github.com/arkadin91/packages-sdm845/releases/download/beryllium/linux-headers-7.1.0-rc1-sdm845.deb"

# ── Firmware ─────────────────────────────────────────────────────────────────
# Upstream bundles firmware debs in files/ -> /opt/*.deb
FW_DEB="linux-firmware-xiaomi-beryllium-sdm845.deb"

# Our download-based install (used when FW_INSTALL_MODE=download)
FW_ARCHIVE_URL="https://github.com/arkadin91/packages-sdm845/releases/download/beryllium/firmware-xiaomi-beryllium-sdm845.tar.gz"

# ── Audio ────────────────────────────────────────────────────────────────────
ALSA_UCM_URL="https://repo.mobian.org/pool/main/a/alsa-ucm-conf/alsa-ucm-conf_1.2.15.3-1mobian3_all.deb"
DEVICE_MASKED_SERVICES="alsa-state alsa-restore"

# ── Display variants ─────────────────────────────────────────────────────────
# beryllium ships with two panel vendors — selected at build time
DEVICE_DISPLAYS="tianma ebbg"
DEVICE_DEFAULT_DISPLAY="tianma"
DEVICE_DTB_TIANMA="sdm845-xiaomi-beryllium-tianma.dtb"
DEVICE_DTB_EBBG="sdm845-xiaomi-beryllium-ebbg.dtb"

# ── Packages ─────────────────────────────────────────────────────────────────
DEVICE_PACKAGES="abootimg zstd hexagonrpcd libqrtr-glib0"

# ── Services ─────────────────────────────────────────────────────────────────
DEVICE_SERVICES="hexagonrpcd grow-rootfs"

# ── hexagonrpcd ordering ─────────────────────────────────────────────────────
# Must start After=multi-user.target — do NOT use udev remoteproc gating
HEXAGONRPCD_AFTER="multi-user.target"
