# Mobuntu RC15 — devices/switch-v1.yaml
# Nintendo Switch V1 (Erista, T210, icosa)
# Ubuntu base: noble (24.04) — forced by DEVICE_UBUNTU_OVERRIDE in device config.
# l4t-debs does not yet support resolute (26.04).

architecture: arm64

actions:
  # Unpack base tarball — uses DEVICE_UBUNTU_OVERRIDE (noble), not UBUNTU_RELEASE
  - action: unpack
    file: base-{{ .DEVICE_UBUNTU_OVERRIDE }}.tar.gz
    compression: gz

  - action: recipe
    recipe: ../l4t.yaml
    variables:
      DEVICE_CODENAME: "{{ .DEVICE_CODENAME }}"
      DEVICE_PACKAGES: "{{ .DEVICE_PACKAGES }}"
      DEVICE_SERVICES: "{{ .DEVICE_SERVICES }}"

  # Install L4T kernel via l4t-debs repo (method: l4t_repo)
  # Package name confirmed from theofficialgman's repo — verify if build fails.
  - action: run
    chroot: true
    command: |
      export DEBIAN_FRONTEND=noninteractive
      KERNEL_METHOD="{{ .KERNEL_METHOD }}"

      case "${KERNEL_METHOD}" in
      l4t_repo)
          # Kernel already installed via l4t.yaml BSP packages above.
          # update-initramfs generates the initrd the L4T boot process needs.
          echo ">>> L4T kernel installed via repo. Generating initramfs..."
          update-initramfs -c -k all
          ;;
      custom_url)
          KERNEL_REPO="{{ .KERNEL_REPO }}"
          if [ -z "${KERNEL_REPO}" ]; then
              echo "ERROR: KERNEL_REPO is empty — set it in the device config."
              exit 1
          fi
          TMP_DEB=$(mktemp /tmp/kernel-XXXX.deb)
          curl -fsSL -o "$TMP_DEB" "${KERNEL_REPO}"
          dpkg -i "$TMP_DEB" || apt-get install -f -y
          rm -f "$TMP_DEB"
          update-initramfs -c -k all
          ;;
      esac

  - action: run
    chroot: true
    command: |
      echo "{{ .DEVICE_HOSTNAME }}" > /etc/hostname
      printf "127.0.0.1   localhost\n127.0.1.1   {{ .DEVICE_HOSTNAME }}\n::1         localhost ip6-localhost ip6-loopback\n" \
          > /etc/hosts

  - action: run
    chroot: true
    command: apt-get clean

  - action: pack
    file: {{ .DEVICE_IMAGE_LABEL }}-{{ .DEVICE_UBUNTU_OVERRIDE }}.tar.gz
    compression: gz
